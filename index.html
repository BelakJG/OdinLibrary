<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Library</title>
    <script src="./script.js" defer></script>
    <link href="./normalize.css" rel="stylesheet">
    <link href="./style.css" rel="stylesheet">
</head>
<body>
    
    <div id="formBackdrop"></div>
    <form id="bookForm" class="form-popup">
        <h3>Book Info</h3>
        
        <div class="field">
            <label for="_title">Title: </label>
            <input type="text" placeholder="Book Title" name="_title" required>
        </div>
        
        <div class="field">
            <label for="_author">Author: </label>
            <input type="text" placeholder="Book Author" name="_author" required>
        </div>
        
        <div class="field">
            <label for="_num_pages">Pages: </label>
            <input type="text" placeholder="Book Page Count" name="_num_pages" required>
        </div>
        
        <div class="field">
            <label for="_has_read">Read?: </label>
            <input type="checkbox" name="_has_read" value="true">
        </div>
        
        <div class="form-buttons">
            <button type="submit">Add Book</button>
            <button type="button" onclick="closeForm()">Cancel</button>
        </div>
    </form>
    <div id="mainContent">
        <h1>Gumshoe Book Library</h1>
        <h3>List of books:</h3>
        <button onclick="newBook()">Add Book</button>
        <div>
            <ul id="books-list"></ul>
        </div>
    </div>
</body>
</html>
