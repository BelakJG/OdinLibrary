<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Library</title>
    <script src="./script.js" defer></script>
    <link href="./normalize.css" rel="stylesheet">
    <link href="./style.css" rel="stylesheet">
</head>
<body>
    
    <div id="formBackdrop"></div>
    <form id="bookForm" class="form-popup">
        <h3>Book Info</h3>
        
        <div class="field">
            <label for="title">Title: </label>
            <input type="text" placeholder="Book Title" name="title" required>
        </div>
        
        <div class="field">
            <label for="author">Author: </label>
            <input type="text" placeholder="Book Author" name="author" required>
        </div>
        
        <div class="field">
            <label for="num_pages">Pages: </label>
            <input type="text" placeholder="Book Page Count" name="num_pages" required>
        </div>
        
        <div class="field">
            <label for="has_read">Read?: </label>
            <input type="checkbox" name="has_read" value="true">
        </div>
        
        <div class="form-buttons">
            <button type="submit">Add Book</button>
            <button type="button" onclick="closeForm()">Cancel</button>
        </div>
    </form>
    
    <h3>List of books:</h3>
    <button onclick="newBook()">Add Book</button>
    <div>
        <ul id="books-list"></ul>
    </div>
</body>
</html>
